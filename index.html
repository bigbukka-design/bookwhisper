<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookWhisper AI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1612;--paper:#f5f0e8;--cream:#ede8dc;--warm:#c4a882;--accent:#7c4f2f;--muted:#7a6e62;--font-serif:'Playfair Display',Georgia,serif;--font-sans:'DM Sans',system-ui,sans-serif}
body{font-family:var(--font-sans);background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(0,0,0,0.012) 28px,rgba(0,0,0,0.012) 29px);pointer-events:none;z-index:0}
.container{position:relative;z-index:1;width:100%;max-width:780px;padding:2.5rem 1.5rem 4rem;display:flex;flex-direction:column;align-items:center;gap:2rem}
header{text-align:center;display:flex;flex-direction:column;align-items:center;gap:0.5rem}
.logo-mark{width:56px;height:56px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:0.5rem}
.logo-mark svg{width:28px;height:28px}
h1{font-family:var(--font-serif);font-size:clamp(1.8rem,5vw,2.6rem);font-weight:600;letter-spacing:-0.02em}
.tagline{font-size:0.92rem;color:var(--muted);font-weight:300;letter-spacing:0.08em;text-transform:uppercase}
.avatar-stage{display:flex;flex-direction:column;align-items:center;gap:1.25rem;padding:1rem 0}
.avatar-wrap{position:relative;width:220px;height:220px}
.ring-canvas{position:absolute;inset:-20px;width:260px;height:260px;pointer-events:none;z-index:2}
.avatar-circle{width:220px;height:220px;border-radius:50%;border:3px solid var(--warm);overflow:hidden;position:relative;z-index:1;transition:transform 0.6s cubic-bezier(0.34,1.56,0.64,1)}
.avatar-circle.nodding{animation:nod 0.5s ease-in-out 3}
.avatar-circle.leaning{transform:scale(1.06) translateY(-6px)}
@keyframes nod{0%,100%{transform:translateY(0) rotate(0deg)}30%{transform:translateY(6px) rotate(1.5deg)}70%{transform:translateY(3px) rotate(0.5deg)}}
.avatar-photo{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:transform 0.6s ease}
.mouth-canvas{position:absolute;bottom:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3}
.state-label{font-size:0.85rem;color:var(--muted);height:1.4em;letter-spacing:0.02em}
.controls{display:flex;gap:1rem;align-items:center}
.mic-btn{width:64px;height:64px;border-radius:50%;border:2px solid var(--accent);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s,box-shadow 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.mic-btn:hover{background:var(--cream)}
.mic-btn.recording{background:var(--accent);border-color:var(--accent);animation:pulse-btn 1s ease-in-out infinite}
@keyframes pulse-btn{0%,100%{box-shadow:0 0 0 6px rgba(124,79,47,0.15)}50%{box-shadow:0 0 0 14px rgba(124,79,47,0.04)}}
.mic-btn svg{width:26px;height:26px}
.mic-btn.recording svg{stroke:white}
.icon-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid #ddd;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color 0.2s}
.icon-btn:hover{border-color:var(--accent)}
.icon-btn.hidden{opacity:0;pointer-events:none}
.icon-btn svg{width:16px;height:16px}
.chat-area{width:100%;display:flex;flex-direction:column;gap:1rem}
.chat-divider{display:flex;align-items:center;gap:0.75rem;color:var(--muted);font-size:0.78rem;letter-spacing:0.06em;text-transform:uppercase}
.chat-divider::before,.chat-divider::after{content:'';flex:1;height:1px;background:var(--cream)}
.message{display:flex;gap:0.75rem;animation:fadeIn 0.35s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.message.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.75rem;overflow:hidden}
.msg-avatar.ai{background:var(--accent);color:white;font-family:var(--font-serif);font-size:0.85rem}
.msg-avatar.user{background:var(--cream);color:var(--muted)}
.msg-bubble{max-width:78%;padding:0.75rem 1rem;border-radius:14px;font-size:0.92rem;line-height:1.65;color:var(--ink)}
.message.ai .msg-bubble{background:white;border:1px solid var(--cream);border-radius:4px 14px 14px 14px}
.message.user .msg-bubble{background:var(--accent);color:white;border-radius:14px 4px 14px 14px}
.book-card{display:flex;gap:0.75rem;padding:0.65rem 0.75rem;background:var(--paper);border-radius:10px;margin:0.5rem 0;border-left:3px solid var(--warm);text-decoration:none}
.book-card:hover{background:var(--cream)}
.book-cover{width:42px;height:58px;border-radius:3px;flex-shrink:0;object-fit:cover;background:#ddd}
.book-cover-placeholder{width:42px;height:58px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:0.6rem;color:white;writing-mode:vertical-rl;font-style:italic;overflow:hidden}
.book-title{font-family:var(--font-serif);font-weight:600;font-size:0.88rem;color:var(--ink)}
.book-author{font-size:0.78rem;color:var(--muted);margin-top:1px}
.book-desc{font-size:0.8rem;color:#555;margin-top:4px;line-height:1.5}
.book-links{display:flex;gap:8px;margin-top:6px}
.book-link{font-size:0.72rem;padding:2px 8px;border-radius:20px;background:var(--cream);color:var(--accent);text-decoration:none;border:1px solid var(--warm)}
.book-link:hover{background:var(--warm);color:white}
.typing-indicator{display:flex;gap:5px;align-items:center;padding:12px 16px;background:white;border:1px solid var(--cream);border-radius:4px 14px 14px 14px;width:fit-content}
.dot-bounce{width:7px;height:7px;border-radius:50%;background:var(--warm)}
.dot-bounce:nth-child(1){animation:bounce 1.2s ease-in-out infinite}
.dot-bounce:nth-child(2){animation:bounce 1.2s ease-in-out 0.2s infinite}
.dot-bounce:nth-child(3){animation:bounce 1.2s ease-in-out 0.4s infinite}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.text-input-row{width:100%;display:flex;gap:0.75rem;align-items:center}
.text-input-row input{flex:1;padding:0.7rem 1rem;border-radius:50px;border:1.5px solid var(--cream);background:white;font-size:0.92rem;font-family:var(--font-sans);outline:none}
.text-input-row input:focus{border-color:var(--warm)}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s}
.send-btn:hover{background:#6a3d22}
.send-btn svg{width:18px;height:18px}
.share-btn{display:flex;align-items:center;gap:6px;padding:0.5rem 1.2rem;border-radius:50px;border:1.5px solid var(--warm);background:white;color:var(--accent);font-family:var(--font-sans);font-size:0.83rem;font-weight:500;cursor:pointer;transition:background 0.2s;display:none}
.share-btn:hover{background:var(--cream)}
.share-btn svg{width:14px;height:14px}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:white;padding:0.7rem 1.4rem;border-radius:50px;font-size:0.85rem;opacity:0;transition:all 0.3s ease;z-index:100;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<script>
const SYSTEM_PROMPT = `Du är BookWhisper, en varm och kunnig AI-boktipsare med djup kärlek för litteratur. Du talar svenska med en personlig, litterär stil.

Ditt uppdrag: Ge utmärkta boktips anpassade efter läsarens önskemål.

Arbetsflöde:
1. Hälsa kort och ställ 1-2 frågor om vad personen vill ha (genre, humör, längd, om de läst något de gillade).
2. Ge 2-3 konkreta boktips baserade på svaren.
3. Avsluta alltid med en följdfråga, t.ex. "Vill du ha mer i samma stil, eller något helt annorlunda?" eller "Ska jag fördjupa mig i någon av dessa?"
4. Formatera VARJE boktips exakt så här (en rad):
BOOK: [Titel] | [Författare] | [Beskrivning 1-2 meningar]

H�ll svaren kortfattade — max 3-4 meningar plus boktips. Tala som en klok bokhandlare.`;

let history = [];
let recognition = null;
let isRecording = false;
let currentAudio = null;
let audioCtx = null;
let analyser = null;
let animFrame = null;
let mouthVal = 0;
let avatarMode = 'idle';
let collectedBooks = [];
const audioSources = new WeakMap();

// ── Ring canvas ──────────────────────────────────────────
const ringCanvas = document.getElementById('ring-canvas');
const rctx = ringCanvas.getContext('2d');
ringCanvas.width = 260; ringCanvas.height = 260;

function drawRings() {
  rctx.clearRect(0,0,260,260);
  if (avatarMode === 'speaking' || avatarMode === 'listening') {
    const color = avatarMode === 'speaking' ? '196,168,130' : '124,79,47';
    const t = Date.now() / 1000;
    for (let i = 0; i < 3; i++) {
      const phase = (t * 0.75 + i * 0.38) % 1;
      const r = 113 + phase * 65;
      rctx.beginPath();
      rctx.arc(130,130,r,0,Math.PI*2);
      rctx.strokeStyle = `rgba(${color},${(1-phase)*0.5})`;
      rctx.lineWidth = 1.5;
      rctx.stroke();
    }
  }
  requestAnimationFrame(drawRings);
}
drawRings();

// ── Mouth canvas overlay ─────────────────────────────────
const mouthCanvas = document.getElementById('mouth-canvas');
const mctx = mouthCanvas.getContext('2d');

function resizeMouthCanvas() {
  mouthCanvas.width = mouthCanvas.offsetWidth;
  mouthCanvas.height = mouthCanvas.offsetHeight;
}
resizeMouthCanvas();
window.addEventListener('resize', resizeMouthCanvas);

function drawMouth(openAmount) {
  const w = mouthCanvas.width, h = mouthCanvas.height;
  mctx.clearRect(0,0,w,h);
  if (openAmount < 0.04) return;
  // Position mouth at ~72% down, centered
  const cx = w * 0.5, cy = h * 0.72;
  const mw = w * 0.22, mh = openAmount * h * 0.09;
  // Teeth
  mctx.fillStyle = 'rgba(255,252,245,0.92)';
  mctx.beginPath();
  mctx.ellipse(cx, cy, mw * 0.75, Math.max(mh * 0.6, 2), 0, 0, Math.PI * 2);
  mctx.fill();
  // Lip outline
  mctx.strokeStyle = 'rgba(120,60,40,0.35)';
  mctx.lineWidth = 1.5;
  mctx.beginPath();
  mctx.ellipse(cx, cy, mw, mh + 2, 0, 0, Math.PI * 2);
  mctx.stroke();
}

function mouthLoop() {
  if (analyser && avatarMode === 'speaking') {
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const avg = Array.from(data.slice(1,12)).reduce((a,b)=>a+b,0) / 11;
    const target = Math.min(1, avg / 75);
    mouthVal += (target - mouthVal) * 0.3;
  } else {
    mouthVal += (0 - mouthVal) * 0.18;
  }
  drawMouth(mouthVal);
  requestAnimationFrame(mouthLoop);
}
mouthLoop();

// ── Body language ────────────────────────────────────────
const avatarCircle = document.getElementById('avatar-circle');
let bodyTimer = null;

function setBodyLanguage(mode) {
  avatarCircle.classList.remove('nodding','leaning');
  clearTimeout(bodyTimer);
  if (mode === 'nod') {
    avatarCircle.classList.add('nodding');
    bodyTimer = setTimeout(() => avatarCircle.classList.remove('nodding'), 1600);
  } else if (mode === 'lean') {
    avatarCircle.classList.add('leaning');
  }
}

// ── Avatar state ─────────────────────────────────────────
function setAvatarState(state) {
  avatarMode = state;
  const label = document.getElementById('state-label');
  const stopBtn = document.getElementById('stop-btn');
  const map = { speaking:['Talar...',false], listening:['Lyssnar...',true], thinking:['Tänker...',true], idle:['Redo att lyssna',true] };
  const [text, hideStop] = map[state] || map.idle;
  label.textContent = text;
  stopBtn.classList.toggle('hidden', hideStop);
  if (state === 'listening') setBodyLanguage('nod');
  if (state === 'idle') setBodyLanguage('');
}

// ── Audio ─────────────────────────────────────────────────
function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function setupAudioAnalyser(audioEl) {
  try {
    ensureAudioCtx();
    let source = audioSources.get(audioEl);
    if (!source) { source = audioCtx.createMediaElementSource(audioEl); audioSources.set(audioEl, source); }
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64; analyser.smoothingTimeConstant = 0.65;
    source.connect(analyser); analyser.connect(audioCtx.destination);
  } catch(e) { console.warn('AudioContext:', e); analyser = null; }
}

async function speakText(text, hasBooks) {
  const spoken = text
    .replace(/BOOK:\s*([^|]+)\|([^|]+)\|(.+)/g, (_,t,a,d) => `${t.trim()} av ${a.trim()}. ${d.trim()}`)
    .replace(/\n+/g,' ').trim();
  setAvatarState('speaking');
  if (hasBooks) setBodyLanguage('lean');
  try {
    const resp = await fetch('/api/elevenlabs', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text:spoken}) });
    if (!resp.ok) { const e = await resp.json().catch(()=>({})); throw new Error(e.detail?.message || `fel ${resp.status}`); }
    const url = URL.createObjectURL(await resp.blob());
    currentAudio = new Audio(url);
    currentAudio.crossOrigin = 'anonymous';
    setupAudioAnalyser(currentAudio);
    currentAudio.onended = () => { analyser=null; setAvatarState('idle'); setBodyLanguage(''); URL.revokeObjectURL(url); };
    currentAudio.onerror = () => { analyser=null; setAvatarState('idle'); setBodyLanguage(''); };
    await currentAudio.play();
  } catch(e) { console.error(e); toast('Röstfel: '+e.message); analyser=null; browserTTS(spoken); }
}

function browserTTS(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='sv-SE'; u.rate=0.95;
  u.onstart=()=>setAvatarState('speaking');
  u.onend=()=>{ setAvatarState('idle'); setBodyLanguage(''); };
  speechSynthesis.speak(u);
}

function stopSpeaking() {
  if (currentAudio) { currentAudio.pause(); currentAudio=null; }
  speechSynthesis.cancel(); analyser=null; setAvatarState('idle'); setBodyLanguage('');
}

// ── Google Books ──────────────────────────────────────────
async function fetchBookCover(title, author) {
  try {
    const q = encodeURIComponent(`${title} ${author}`);
    const r = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=1`);
    const d = await r.json();
    const info = d.items?.[0]?.volumeInfo;
    const cover = info?.imageLinks?.thumbnail?.replace('http:','https:') || null;
    const gbId = d.items?.[0]?.id || null;
    return { cover, gbId };
  } catch(e) { return { cover:null, gbId:null }; }
}

// ── Claude API ────────────────────────────────────────────
async function callClaude(userMsg) {
  history.push({ role:'user', content:userMsg });
  setAvatarState('thinking'); showTyping();
  try {
    const resp = await fetch('/api/claude', { method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:900, system:SYSTEM_PROMPT, messages:history }) });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error?.message || resp.statusText);
    const text = data.content[0].text;
    history.push({ role:'assistant', content:text });
    return text;
  } catch(e) { console.error(e); toast('Fel: '+e.message); return null; }
  finally { removeTyping(); }
}

// ── Mic ───────────────────────────────────────────────────
function toggleMic() { if (isRecording) stopRecording(); else startRecording(); }
function startRecording() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Röstinmatning stöds ej. Skriv istället.'); return; }
  stopSpeaking(); ensureAudioCtx();
  recognition = new SR(); recognition.lang='sv-SE'; recognition.interimResults=false;
  recognition.onstart = () => { isRecording=true; document.getElementById('mic-btn').classList.add('recording'); setAvatarState('listening'); };
  recognition.onresult = async (e) => {
    const t = e.results[0][0].transcript; stopRecording();
    addMessage('user', t);
    const reply = await callClaude(t);
    if (reply) { await renderReply(reply); }
  };
  recognition.onerror = (e) => { stopRecording(); if (e.error!=='no-speech') toast('Röstfel: '+e.error); };
  recognition.onend = () => { if (isRecording) stopRecording(); };
  recognition.start();
}
function stopRecording() {
  isRecording=false; document.getElementById('mic-btn').classList.remove('recording');
  if (recognition) { try{recognition.stop()}catch(e){} recognition=null; }
  if (avatarMode==='listening') setAvatarState('idle');
}

// ── Text input ────────────────────────────────────────────
async function sendText() {
  const inp = document.getElementById('text-input');
  const text = inp.value.trim(); if (!text) return;
  ensureAudioCtx(); inp.value=''; addMessage('user', text);
  const reply = await callClaude(text);
  if (reply) await renderReply(reply);
}

// ── Render reply with book covers + Bokus links ───────────
async function renderReply(text) {
  const hasBooks = text.includes('BOOK:');
  addMessage('assistant', text);
  if (hasBooks) {
    document.getElementById('share-btn').style.display = 'flex';
  }
  speakText(text, hasBooks);
}

// ── Chat display ──────────────────────────────────────────
const bookColors = ['#5a3520','#3a5f7a','#4a6741','#7a4f3a','#4a4870','#6b4c20'];

function addMessage(role, text) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'message '+(role==='user'?'user':'ai');
  const av = document.createElement('div');
  av.className = 'msg-avatar '+(role==='user'?'user':'ai');
  if (role==='ai') {
    const img = document.createElement('img');
    img.src = document.getElementById('avatar-photo').src;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%';
    av.appendChild(img);
  } else { av.textContent='👤'; }
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = formatMsg(text, role);
  div.appendChild(av); div.appendChild(bubble);
  area.appendChild(div); area.scrollTop=area.scrollHeight;
  // Fetch covers async for book cards
  if (role==='ai') fetchCoversForBubble(bubble, text);
}

function formatMsg(text, role) {
  if (role==='user') return esc(text);
  let html=''; let ci=0;
  for (const line of text.split('\n')) {
    if (line.startsWith('BOOK:')) {
      const parts = line.replace('BOOK:','').split('|');
      if (parts.length>=3) {
        const [t,a,d] = parts.map(s=>s.trim());
        const color = bookColors[ci%bookColors.length];
        const slug = encodeURIComponent(t.toLowerCase().replace(/\s+/g,'-'));
        const bokusUrl = `https://www.bokus.com/cgi-bin/product_search.cgi?search_word=${encodeURIComponent(t+' '+a)}`;
        const goodreadsUrl = `https://www.goodreads.com/search?q=${encodeURIComponent(t+' '+a)}`;
        const cardId = `book-card-${ci}`;
        collectedBooks.push({t,a,d});
        html += `<a class="book-card" href="${bokusUrl}" target="_blank" id="${cardId}" onclick="event.stopPropagation()">
          <div class="book-cover-placeholder" style="background:${color}" data-title="${esc(t)}" data-author="${esc(a)}">${esc(t.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase())}</div>
          <div style="flex:1">
            <div class="book-title">${esc(t)}</div>
            <div class="book-author">${esc(a)}</div>
            <div class="book-desc">${esc(d)}</div>
            <div class="book-links">
              <a class="book-link" href="${bokusUrl}" target="_blank" onclick="event.stopPropagation()">Bokus</a>
              <a class="book-link" href="${goodreadsUrl}" target="_blank" onclick="event.stopPropagation()">Goodreads</a>
            </div>
          </div>
        </a>`;
        ci++;
      }
    } else if (line.trim()) {
      html += `<p style="margin-bottom:0.5em">${esc(line)}</p>`;
    }
  }
  return html;
}

async function fetchCoversForBubble(bubble, text) {
  const placeholders = bubble.querySelectorAll('.book-cover-placeholder');
  for (const ph of placeholders) {
    const title = ph.dataset.title, author = ph.dataset.author;
    const { cover } = await fetchBookCover(title, author);
    if (cover) {
      const img = document.createElement('img');
      img.className = 'book-cover';
      img.src = cover;
      img.alt = title;
      img.onerror = () => {}; // keep placeholder on error
      ph.replaceWith(img);
    }
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showTyping() {
  const area=document.getElementById('chat-area');
  const div=document.createElement('div'); div.className='message ai'; div.id='typing-msg';
  const av=document.createElement('div'); av.className='msg-avatar ai';
  const img=document.createElement('img'); img.src=document.getElementById('avatar-photo').src;
  img.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:50%';
  av.appendChild(img);
  const ind=document.createElement('div'); ind.className='typing-indicator';
  ind.innerHTML='<div class="dot-bounce"></div><div class="dot-bounce"></div><div class="dot-bounce"></div>';
  div.appendChild(av); div.appendChild(ind); area.appendChild(div); area.scrollTop=area.scrollHeight;
}
function removeTyping() { const el=document.getElementById('typing-msg'); if(el) el.remove(); }
function toast(msg,dur=3500) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),dur); }

// ── Share ─────────────────────────────────────────────────
function shareBooks() {
  if (!collectedBooks.length) return;
  const text = '📚 Boktips från BookWhisper:\n\n' +
    collectedBooks.map(b=>`• ${b.t} av ${b.a}\n  ${b.d}`).join('\n\n');
  if (navigator.share) {
    navigator.share({ title:'Mina boktips', text }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=>toast('Kopierat till urklipp!'));
  }
}

function resetConversation() {
  history=[]; collectedBooks=[];
  document.getElementById('chat-area').innerHTML='<div class="chat-divider">Konversation</div>';
  document.getElementById('share-btn').style.display='none';
  stopSpeaking();
  startConversation();
}

async function startConversation() {
  const reply = await callClaude('Hej! Jag vill ha boktips.');
  if (reply) await renderReply(reply);
}

// ── Start overlay ─────────────────────────────────────────
const _ov = document.createElement('div');
_ov.style.cssText='position:fixed;inset:0;background:rgba(245,240,232,0.96);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;z-index:200';
_ov.innerHTML=`
  <div style="font-family:'Playfair Display',Georgia,serif;font-size:2rem;font-weight:600;color:#1a1612;letter-spacing:-0.02em">BookWhisper</div>
  <p style="font-size:0.88rem;color:#7a6e62;text-transform:uppercase;letter-spacing:0.1em;font-family:'DM Sans',sans-serif">Din personliga AI-boktipsare</p>
  <button id="start-btn" style="margin-top:0.5rem;padding:0.9rem 2.8rem;background:#7c4f2f;color:white;border:none;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:500;cursor:pointer">Starta samtalet</button>
`;
document.body.appendChild(_ov);
document.getElementById('start-btn').addEventListener('click', () => {
  ensureAudioCtx(); _ov.remove(); startConversation();
});
</script>
