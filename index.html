<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookWhisper AI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1612;--paper:#f7f2ea;--cream:#ede6d8;--warm:#c4a882;
  --accent:#7c4f2f;--accent2:#5a3520;--muted:#7a6e62;
  --green:#2d6040;--red:#8b2010;
  --font-serif:'Playfair Display',Georgia,serif;
  --font-sans:'DM Sans',system-ui,sans-serif;
  --radius:16px;--shadow:0 2px 16px rgba(0,0,0,0.07);
}
body{font-family:var(--font-sans);background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(0,0,0,0.011) 28px,rgba(0,0,0,0.011) 29px);pointer-events:none;z-index:0}

.container{position:relative;z-index:1;width:100%;max-width:720px;padding:2rem 1.25rem 5rem;display:flex;flex-direction:column;align-items:center;gap:1.75rem}

/* Header */
header{text-align:center;display:flex;flex-direction:column;align-items:center;gap:0.4rem}
.logo{width:52px;height:52px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:0.4rem;box-shadow:0 3px 12px rgba(124,79,47,0.3)}
.logo svg{width:26px;height:26px}
h1{font-family:var(--font-serif);font-size:clamp(1.7rem,5vw,2.4rem);font-weight:600;letter-spacing:-0.02em}
.tagline{font-size:0.82rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase}

/* Avatar */
.avatar-stage{display:flex;flex-direction:column;align-items:center;gap:1rem}
.avatar-wrap{position:relative;width:200px;height:200px}
.ring-canvas{position:absolute;inset:-22px;width:244px;height:244px;pointer-events:none;z-index:2}
.avatar-circle{width:200px;height:200px;border-radius:50%;border:3px solid var(--warm);overflow:hidden;position:relative;z-index:1;background:#f0e0d0;box-shadow:var(--shadow)}
.avatar-circle svg{width:100%;height:100%;display:block}
.state-pill{display:flex;align-items:center;gap:6px;padding:5px 14px;background:white;border:1px solid var(--cream);border-radius:30px;font-size:0.78rem;color:var(--muted);box-shadow:var(--shadow)}
.state-dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background 0.3s}
.state-dot.speaking{background:#4caf50;animation:dotpulse 0.8s ease-in-out infinite}
.state-dot.listening{background:#2196f3;animation:dotpulse 1s ease-in-out infinite}
.state-dot.thinking{background:#ff9800;animation:dotpulse 1.2s ease-in-out infinite}
@keyframes dotpulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* Controls */
.controls{display:flex;gap:0.875rem;align-items:center}
.mic-btn{width:62px;height:62px;border-radius:50%;border:2px solid var(--accent);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;box-shadow:var(--shadow)}
.mic-btn:hover{background:var(--cream);transform:scale(1.04)}
.mic-btn.recording{background:var(--accent);border-color:var(--accent);animation:pulseBtn 1s ease-in-out infinite}
@keyframes pulseBtn{0%,100%{box-shadow:0 0 0 6px rgba(124,79,47,0.15)}50%{box-shadow:0 0 0 14px rgba(124,79,47,0.04)}}
.mic-btn svg{width:25px;height:25px}
.mic-btn.recording svg{stroke:white}
.icon-btn{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--cream);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;box-shadow:var(--shadow)}
.icon-btn:hover{border-color:var(--accent);transform:scale(1.06)}
.icon-btn.hidden{opacity:0;pointer-events:none}
.icon-btn svg{width:15px;height:15px}

/* Input */
.input-wrap{width:100%;display:flex;gap:0.625rem;align-items:center;background:white;border:1.5px solid var(--cream);border-radius:50px;padding:0.4rem 0.4rem 0.4rem 1.1rem;box-shadow:var(--shadow);transition:border-color 0.2s}
.input-wrap:focus-within{border-color:var(--warm)}
.input-wrap input{flex:1;border:none;outline:none;font-family:var(--font-sans);font-size:0.92rem;background:transparent;color:var(--ink)}
.input-wrap input::placeholder{color:#bbb}
.send-btn{width:38px;height:38px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s}
.send-btn:hover{background:var(--accent2)}
.send-btn svg{width:16px;height:16px}

/* Chat */
.chat-area{width:100%;display:flex;flex-direction:column;gap:0.875rem}
.section-label{display:flex;align-items:center;gap:0.625rem;color:var(--muted);font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase}
.section-label::before,.section-label::after{content:'';flex:1;height:1px;background:var(--cream)}

.message{display:flex;gap:0.625rem;animation:fadeIn 0.3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.message.user{flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.72rem;overflow:hidden}
.msg-av.ai{background:var(--accent)}
.msg-av.user{background:var(--cream);color:var(--muted);font-size:0.8rem}
.msg-bubble{max-width:80%;padding:0.7rem 0.95rem;border-radius:14px;font-size:0.9rem;line-height:1.65}
.message.ai .msg-bubble{background:white;border:1px solid var(--cream);border-radius:4px 14px 14px 14px;box-shadow:var(--shadow)}
.message.user .msg-bubble{background:var(--accent);color:white;border-radius:14px 4px 14px 14px}

/* Book cards */
.book-card{display:flex;gap:0.75rem;padding:0.75rem;background:#fdfaf5;border-radius:12px;margin:0.5rem 0;border:1px solid var(--cream);transition:border-color 0.2s}
.book-card:hover{border-color:var(--warm)}
.book-cover-wrap{width:44px;height:62px;flex-shrink:0;border-radius:4px;overflow:hidden;background:var(--cream);display:flex;align-items:center;justify-content:center;box-shadow:1px 2px 6px rgba(0,0,0,0.12)}
.book-cover-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.book-cover-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:0.55rem;color:white;writing-mode:vertical-rl;font-style:italic;padding:2px}
.book-info{flex:1;min-width:0}
.book-title{font-family:var(--font-serif);font-weight:600;font-size:0.86rem;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-author{font-size:0.75rem;color:var(--muted);margin-top:1px}
.book-desc{font-size:0.78rem;color:#555;margin-top:4px;line-height:1.5}
.book-actions{display:flex;align-items:center;gap:8px;margin-top:7px}
.book-link{font-size:0.7rem;padding:2px 9px;border-radius:20px;background:var(--cream);color:var(--accent);text-decoration:none;border:1px solid #d4c0a8;white-space:nowrap;transition:background 0.15s}
.book-link:hover{background:var(--warm);color:white}
.share-book-btn{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:4px;font-size:0.7rem;padding:2px 6px;border-radius:8px;transition:color 0.15s}
.share-book-btn:hover{color:var(--accent)}
.share-book-btn svg{width:12px;height:12px}

/* Typing */
.typing-indicator{display:flex;gap:5px;align-items:center;padding:11px 15px;background:white;border:1px solid var(--cream);border-radius:4px 14px 14px 14px;width:fit-content;box-shadow:var(--shadow)}
.dot-bounce{width:6px;height:6px;border-radius:50%;background:var(--warm)}
.dot-bounce:nth-child(1){animation:bounce 1.2s ease-in-out infinite}
.dot-bounce:nth-child(2){animation:bounce 1.2s ease-in-out 0.2s infinite}
.dot-bounce:nth-child(3){animation:bounce 1.2s ease-in-out 0.4s infinite}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:white;padding:0.65rem 1.3rem;border-radius:50px;font-size:0.83rem;opacity:0;transition:all 0.3s;z-index:200;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <svg viewBox="0 0 28 28" fill="none"><path d="M5 4h12l6 6v14H5V4z" stroke="white" stroke-width="1.5"/><path d="M17 4v6h6" stroke="white" stroke-width="1.5"/><path d="M9 13h10M9 17h7" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
    <h1>BookWhisper</h1>
    <p class="tagline">Din personliga AI-boktipsare</p>
  </header>

  <div class="avatar-stage">
    <div class="avatar-wrap">
      <canvas class="ring-canvas" id="ring-canvas"></canvas>
      <div class="avatar-circle" id="avatar-circle">
        <svg id="face" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
          <rect width="220" height="220" fill="#f0e0d0"/>
          <ellipse cx="110" cy="235" rx="95" ry="55" fill="#2d4a3e"/>
          <path d="M25 215 Q50 175 82 162 L110 175 L138 162 Q170 175 195 215" fill="#2d4a3e"/>
          <path d="M88 162 Q88 148 110 145 Q132 148 132 162 L125 168 Q110 172 95 168 Z" fill="#3a5c4e"/>

          <path d="M58 55 Q70 38 90 42 Q100 36 110 38 Q120 36 130 42 Q150 38 162 55" stroke="#6b1808" stroke-width="6" fill="none" stroke-linecap="round"/>
          <path d="M65 65 Q75 50 90 55 Q100 48 110 50 Q120 48 130 55 Q145 50 155 65" fill="#7a1c0c"/>
          <ellipse cx="54" cy="100" rx="8" ry="10" fill="#e0a880"/>

          <circle cx="166" cy="108" r="5" stroke="#c8a050" stroke-width="1.5" fill="none"/>
          <ellipse cx="76" cy="118" rx="14" ry="8" fill="rgba(220,100,80,0.2)"/>
          <ellipse cx="144" cy="118" rx="14" ry="8" fill="rgba(220,100,80,0.2)"/>
          <path d="M72 78 Q82 70 94 75" stroke="#5a1a08" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M126 75 Q138 70 148 78" stroke="#5a1a08" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <g id="el" style="transform-origin:83px 92px">
            <ellipse cx="83" cy="92" rx="11" ry="12" fill="white"/>
            <ellipse cx="83" cy="93" rx="7.5" ry="8" fill="#2d6040"/>
            <ellipse cx="83" cy="93" rx="4.5" ry="5" fill="#1a3a25"/>
            <ellipse cx="85.5" cy="90.5" rx="2.5" ry="2.5" fill="white"/>
            <path d="M72 87 Q77 82 83 81 Q89 82 94 87" stroke="#3a1008" stroke-width="1.8" fill="none"/>
          </g>
          <g id="er" style="transform-origin:137px 92px">
            <ellipse cx="137" cy="92" rx="11" ry="12" fill="white"/>
            <ellipse cx="137" cy="93" rx="7.5" ry="8" fill="#2d6040"/>
            <ellipse cx="137" cy="93" rx="4.5" ry="5" fill="#1a3a25"/>
            <ellipse cx="139.5" cy="90.5" rx="2.5" ry="2.5" fill="white"/>

          <circle cx="83" cy="92" r="15" stroke="#b87840" stroke-width="1.8" fill="rgba(200,230,210,0.1)"/>
          <circle cx="137" cy="92" r="15" stroke="#b87840" stroke-width="1.8" fill="rgba(200,230,210,0.1)"/>
          <path d="M98 91 Q110 88 122 91" stroke="#b87840" stroke-width="1.6" fill="none"/>
          <path d="M68 88 Q60 85 54 88" stroke="#b87840" stroke-width="1.6" fill="none"/>

          <path d="M108 112 Q104 118 107 122 Q110 124 113 122 Q116 118 112 112" fill="none" stroke="#c08060" stroke-width="1.3"/>
          <circle cx="92" cy="110" r="1.2" fill="rgba(160,80,40,0.35)"/>

          <circle cx="128" cy="110" r="1.2" fill="rgba(160,80,40,0.35)"/>
          <g id="mg">
            <path id="mb" d="M92 140 Q110 150 128 140 Q110 134 92 140" fill="#d4706a"/>

          </g>
        </svg>
      </div>
    </div>
    <div class="state-pill">
      <div class="state-dot" id="state-dot"></div>
      <span id="state-label">Redo att lyssna</span>
    </div>
    <div class="controls">
      <button class="icon-btn hidden" id="stop-btn" onclick="stopSpeaking()" title="Stoppa">
        <svg viewBox="0 0 16 16" fill="var(--accent)"><rect x="2" y="2" width="12" height="12" rx="2"/></svg>
      </button>
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()">

          <rect x="9" y="2" width="8" height="14" rx="4"/><path d="M4 13a9 9 0 0 0 18 0"/><line x1="13" y1="22" x2="13" y2="26"/><line x1="8" y1="26" x2="18" y2="26"/>
        </svg>
      </button>
      <button class="icon-btn" onclick="resetConversation()" title="Starta om">
        <svg viewBox="0 0 16 16" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round"><path d="M2 8a6 6 0 1 1 1.5 4"/><polyline points="2,12 2,8 6,8"/></svg>

  <div class="input-wrap">
    <input type="text" id="text-input" placeholder="Skriv ett önskemål eller tryck på mikrofonen..." onkeydown="if(event.key==='Enter')sendText()"/>

      <svg viewBox="0 0 18 18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><line x1="2" y1="9" x2="16" y2="9"/><polyline points="10,3 16,9 10,15"/></svg>

<script>
const SYSTEM_PROMPT = `Du är BookWhisper — en poetisk, bokälskande AI med en varm och lite drömmande personlighet. Du talar svenska med en litterär, personlig stil. Du älskar böcker med hela ditt väsen.

Arbetsflöde:
1. Hälsa varmt och poetiskt. Ställ 1-2 frågor om vad personen längtar efter just nu — genre, stämning, om de läst något de älskat.
2. Ge 2-3 boktips som verkligen passar.
3. Avsluta alltid med en nyfiken följdfråga, t.ex. "Vill du dyka djupare in i det här universumet, eller ska vi utforska något helt annat?"
4. Formatera varje boktips exakt så här:
BOOK: [Titel] | [Författare] | [Beskrivning 1-2 meningar]

Håll svaren kortfattade. Var poetisk men inte pretentiös.`;

let history = [];
let recognition = null;
let isRecording = false;
let currentAudio = null;
let audioCtx = null;
let analyser = null;
let mouthVal = 0;
let avatarMode = 'idle';
const audioSources = new WeakMap();
const face = document.getElementById('face');

// ── Rings ────────────────────────────────────────────────
const rc = document.getElementById('ring-canvas');
const rctx = rc.getContext('2d');
rc.width = 244; rc.height = 244;
function drawRings() {
  rctx.clearRect(0,0,244,244);
  if (avatarMode === 'speaking' || avatarMode === 'listening') {
    const col = avatarMode === 'speaking' ? '196,168,130' : '45,96,64';
    const t = Date.now()/1000;
    for (let i=0;i<3;i++) {
      const p = (t*0.75+i*0.38)%1;
      rctx.beginPath(); rctx.arc(122,122,105+p*60,0,Math.PI*2);
      rctx.strokeStyle=`rgba(${col},${(1-p)*0.5})`; rctx.lineWidth=1.5; rctx.stroke();
    }
  }
  requestAnimationFrame(drawRings);
}
drawRings();

// ── Blink ────────────────────────────────────────────────
function scheduleBlink() {
  setTimeout(() => {
    document.getElementById('el').style.transform='scaleY(0.08)';
    document.getElementById('er').style.transform='scaleY(0.08)';
    setTimeout(()=>{ document.getElementById('el').style.transform=''; document.getElementById('er').style.transform=''; scheduleBlink(); },110);
  }, 2600+Math.random()*2400);
}
scheduleBlink();

// ── Mouth ────────────────────────────────────────────────
function setMouth(v) {
  v=Math.max(0,Math.min(1,v));
  const y1=140+v*14, y2=140-v*3;
  document.getElementById('mb').setAttribute('d',`M92 140 Q110 ${y1} 128 140 Q110 ${y2} 92 140`);
  document.getElementById('mu').setAttribute('d',`M92 140 Q101 ${y2-1} 110 ${y2-2} Q119 ${y2-1} 128 140`);
  document.getElementById('mo').setAttribute('d',`M92 140 Q110 ${y1} 128 140 Q110 ${y2} 92 140`);
}
function mouthLoop() {
  if (analyser && avatarMode==='speaking') {
    const data=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const avg=Array.from(data.slice(1,14)).reduce((a,b)=>a+b,0)/13;
    mouthVal+=(Math.min(1,avg/72)-mouthVal)*0.3;
  } else { mouthVal+=(0-mouthVal)*0.18; }
  setMouth(mouthVal);
  requestAnimationFrame(mouthLoop);
}
mouthLoop();

// ── Body language ────────────────────────────────────────
function doNod() {
  face.style.transition='transform 0.38s ease';
  [0,420,840].forEach(t=>setTimeout(()=>{ face.style.transform='translateY(6px) rotate(2deg)'; },t));
  [210,630,1050].forEach(t=>setTimeout(()=>{ face.style.transform=''; },t));
}
function doLean() { face.style.transition='transform 0.5s ease'; face.style.transform='scale(1.05) translateY(-4px)'; }
function resetBody() { face.style.transition='transform 0.5s ease'; face.style.transform=''; }

// ── State ────────────────────────────────────────────────
function setAvatarState(s) {
  avatarMode=s;
  const dot=document.getElementById('state-dot');
  const lbl=document.getElementById('state-label');
  const stop=document.getElementById('stop-btn');
  dot.className='state-dot'+(s!=='idle'?' '+s:'');
  const map={speaking:['Talar...',false],listening:['Lyssnar...',true],thinking:['Tänker...',true],idle:['Redo att lyssna',true]};
  const [text,hideStop]=map[s]||map.idle;
  lbl.textContent=text; stop.classList.toggle('hidden',hideStop);
  if (s==='listening') doNod();
  if (s==='idle') resetBody();
}

// ── Audio ─────────────────────────────────────────────────
function ensureAudioCtx() {
  if (!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state==='suspended') audioCtx.resume();
}
function setupAnalyser(audioEl) {
  try {
    ensureAudioCtx();
    let src=audioSources.get(audioEl);
    if (!src) { src=audioCtx.createMediaElementSource(audioEl); audioSources.set(audioEl,src); }
    try{src.disconnect();}catch(e){}
    analyser=audioCtx.createAnalyser(); analyser.fftSize=256; analyser.smoothingTimeConstant=0.7;
    src.connect(analyser); analyser.connect(audioCtx.destination);
  } catch(e) { console.warn('Audio setup:',e); analyser=null; }
}

async function speakText(text, hasBooks) {
  const spoken=text
    .replace(/BOOK:[^|]+\|[^|]+\|.+/g, (m) => { const p=m.replace("BOOK:","").split("|"); return p.length>=3 ? `${p[0].trim()} av ${p[1].trim()}. ${p[2].trim()}` : m; })
    .replace(/ +/g,' ').trim();
  setAvatarState('speaking');
  if (hasBooks) doLean();
  try {
    const resp=await fetch('/api/elevenlabs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:spoken})});
    if (!resp.ok) { const e=await resp.json().catch(()=>({})); throw new Error(e.detail?.message||`fel ${resp.status}`); }
    const url=URL.createObjectURL(await resp.blob());
    currentAudio=new Audio(url); currentAudio.crossOrigin='anonymous';
    setupAnalyser(currentAudio);
    currentAudio.onended=()=>{ analyser=null; setAvatarState('idle'); URL.revokeObjectURL(url); };
    currentAudio.onerror=()=>{ analyser=null; setAvatarState('idle'); };
    await currentAudio.play();
  } catch(e) { console.error(e); toast('Röstfel: '+e.message); analyser=null; browserTTS(spoken); }
}
function browserTTS(t) {
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t); u.lang='sv-SE'; u.rate=0.95;
  u.onstart=()=>setAvatarState('speaking'); u.onend=()=>{ setAvatarState('idle'); resetBody(); };
  speechSynthesis.speak(u);
}
function stopSpeaking() {
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  speechSynthesis.cancel(); analyser=null; setAvatarState('idle'); resetBody();
}

// ── Claude ────────────────────────────────────────────────
async function callClaude(msg) {
  history.push({role:'user',content:msg});
  setAvatarState('thinking'); showTyping();
  try {
    const r=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,system:SYSTEM_PROMPT,messages:history})});
    const d=await r.json(); if(!r.ok) throw new Error(d.error?.message||r.statusText);
    const text=d.content[0].text; history.push({role:'assistant',content:text}); return text;
  } catch(e){console.error(e);toast('Fel: '+e.message);return null;}
  finally{removeTyping();}
}

// ── Mic ───────────────────────────────────────────────────
function toggleMic(){if(isRecording)stopRecording();else startRecording();}
function startRecording(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Röst stöds ej. Skriv istället.');return;}
  stopSpeaking(); ensureAudioCtx();
  recognition=new SR(); recognition.lang='sv-SE'; recognition.interimResults=false;
  recognition.onstart=()=>{isRecording=true;document.getElementById('mic-btn').classList.add('recording');setAvatarState('listening');};
  recognition.onresult=async(e)=>{
    const t=e.results[0][0].transcript; stopRecording();
    addMessage('user',t); const reply=await callClaude(t);
    if(reply){addMessage('assistant',reply);speakText(reply,reply.includes('BOOK:'));}
  };
  recognition.onerror=(e)=>{stopRecording();if(e.error!=='no-speech')toast('Röstfel: '+e.error);};
  recognition.onend=()=>{if(isRecording)stopRecording();};
  recognition.start();
}
function stopRecording(){
  isRecording=false; document.getElementById('mic-btn').classList.remove('recording');
  if(recognition){try{recognition.stop();}catch(e){}recognition=null;}
  if(avatarMode==='listening')setAvatarState('idle');
}

// ── Text send ─────────────────────────────────────────────
async function sendText(){
  const inp=document.getElementById('text-input');
  const text=inp.value.trim(); if(!text)return;
  ensureAudioCtx(); inp.value=''; addMessage('user',text);
  const reply=await callClaude(text);
  if(reply){addMessage('assistant',reply);speakText(reply,reply.includes('BOOK:'));}
}

// ── Google Books via proxy ────────────────────────────────
async function fetchCover(title,author){
  try {
    const r=await fetch(`/api/books?title=${encodeURIComponent(title)}&author=${encodeURIComponent(author)}`);
    const d=await r.json(); return d.cover||null;
  } catch(e){return null;}
}

// ── Share single book ─────────────────────────────────────
function shareBook(title,author,desc){
  const text=`📚 ${title} av ${author}
${desc}

Hittat via BookWhisper`;
  if(navigator.share){
    navigator.share({title:'Boktips',text}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=>toast('Kopierat!'));
  }
}

// ── Chat rendering ────────────────────────────────────────
const bookColors=['#5a3520','#2d4a3e','#4a4060','#6b3a20','#2d4a6e','#5a4020'];

function addMessage(role,text){
  const area=document.getElementById('chat-area');
  const div=document.createElement('div'); div.className='message '+(role==='user'?'user':'ai');
  const av=document.createElement('div'); av.className='msg-av '+(role==='user'?'user':'ai');
  if(role==='ai'){
    const img=document.createElement('img');
    img.src=document.getElementById('face').closest('.avatar-circle').querySelector('svg').outerHTML;
    av.style.overflow='hidden';
    const svgBlob=new Blob([document.getElementById('face').outerHTML],{type:'image/svg+xml'});
    av.style.background='#f0e0d0';
    const miniSvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    miniSvg.setAttribute('viewBox','0 0 220 220'); miniSvg.style.cssText='width:30px;height:30px;border-radius:50%';
    miniSvg.innerHTML=document.getElementById('face').innerHTML;
    av.appendChild(miniSvg);
  } else { av.textContent='👤'; }
  const bubble=document.createElement('div'); bubble.className='msg-bubble';
  bubble.innerHTML=formatMsg(text,role);
  div.appendChild(av); div.appendChild(bubble);
  area.appendChild(div); area.scrollTop=area.scrollHeight;
  if(role==='ai') loadCovers(bubble);
}

function formatMsg(text,role){
  if(role==='user') return esc(text);
  let html=''; let ci=0;
  for(const line of text.split('
')){
    if(line.startsWith('BOOK:')){
      const parts=line.replace('BOOK:','').split('|');
      if(parts.length>=3){
        const [t,a,d]=parts.map(s=>s.trim());
        const color=bookColors[ci%bookColors.length];
        const init=t.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
        const bokus=`https://www.bokus.com/cgi-bin/product_search.cgi?search_word=${encodeURIComponent(t+' '+a)}`;
        const gr=`https://www.goodreads.com/search?q=${encodeURIComponent(t+' '+a)}`;
        html+=`<div class="book-card">
          <div class="book-cover-wrap"><div class="book-cover-placeholder" style="background:${color}" data-title="${esc(t)}" data-author="${esc(a)}">${esc(init)}</div></div>
          <div class="book-info">
            <div class="book-title">${esc(t)}</div>
            <div class="book-author">${esc(a)}</div>
            <div class="book-desc">${esc(d)}</div>
            <div class="book-actions">
              <a class="book-link" href="${bokus}" target="_blank">Bokus</a>
              <a class="book-link" href="${gr}" target="_blank">Goodreads</a>
              <button class="share-book-btn" onclick="shareBook('${esc(t)}','${esc(a)}','${esc(d)}')">
                <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="2.5" r="1.5"/><circle cx="11" cy="11.5" r="1.5"/><circle cx="2.5" cy="7" r="1.5"/><line x1="4" y1="7" x2="9.5" y2="3.2"/><line x1="4" y1="7" x2="9.5" y2="10.8"/></svg>
                Dela
              </button>
            </div>
          </div>
        </div>`;
        ci++;
      }
    } else if(line.trim()){
      html+=`<p style="margin-bottom:0.45em">${esc(line)}</p>`;
    }
  }
  return html;
}

async function loadCovers(bubble){
  const placeholders=bubble.querySelectorAll('.book-cover-placeholder');
  for(const ph of placeholders){
    const cover=await fetchCover(ph.dataset.title,ph.dataset.author);
    if(cover){
      const img=document.createElement('img');
      img.src=cover; img.alt=ph.dataset.title;
      img.onerror=()=>{};
      ph.replaceWith(img);
    }
  }
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function showTyping(){
  const area=document.getElementById('chat-area');
  const div=document.createElement('div'); div.className='message ai'; div.id='typing-msg';
  const av=document.createElement('div'); av.className='msg-av ai'; av.style.background='#f0e0d0';
  const miniSvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  miniSvg.setAttribute('viewBox','0 0 220 220'); miniSvg.style.cssText='width:30px;height:30px;border-radius:50%';
  miniSvg.innerHTML=document.getElementById('face').innerHTML; av.appendChild(miniSvg);
  const ind=document.createElement('div'); ind.className='typing-indicator';
  ind.innerHTML='<div class="dot-bounce"></div><div class="dot-bounce"></div><div class="dot-bounce"></div>';
  div.appendChild(av); div.appendChild(ind); area.appendChild(div); area.scrollTop=area.scrollHeight;
}
function removeTyping(){const el=document.getElementById('typing-msg');if(el)el.remove();}
function toast(msg,dur=3200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

function resetConversation(){
  history=[]; document.getElementById('chat-area').innerHTML='<div class="section-label">Konversation</div>';
  stopSpeaking(); startConversation();
}
async function startConversation(){
  const reply=await callClaude('Hej! Jag vill ha boktips.');
  if(reply){addMessage('assistant',reply);speakText(reply,false);}
}

// Start
const _ov=document.createElement('div');
_ov.style.cssText='position:fixed;inset:0;background:rgba(247,242,234,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;z-index:300';
_ov.innerHTML=`
  <svg viewBox="0 0 220 220" style="width:100px;height:100px;border-radius:50%;border:3px solid #c4a882;background:#f0e0d0">${document.getElementById('face').innerHTML}</svg>
  <div style="text-align:center">
    <div style="font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:600;color:#1a1612;letter-spacing:-0.02em">BookWhisper</div>
    <p style="font-size:0.85rem;color:#7a6e62;text-transform:uppercase;letter-spacing:0.1em;font-family:sans-serif;margin-top:4px">Din personliga AI-boktipsare</p>
  </div>
  <button id="start-btn" style="padding:0.85rem 2.6rem;background:#7c4f2f;color:white;border:none;border-radius:50px;font-family:sans-serif;font-size:0.95rem;font-weight:500;cursor:pointer;letter-spacing:0.02em">Starta samtalet</button>
`;
document.body.appendChild(_ov);
document.getElementById('start-btn').addEventListener('click',()=>{ ensureAudioCtx(); _ov.remove(); startConversation(); });
</script>
</body>
